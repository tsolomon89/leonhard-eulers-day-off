<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leonhard Euler's Day Off — τ-Euler Atlas</title>
  <meta name="description" content="Interactive proof that τ is the unique constant where one unit of counting equals one full rotation. τ^{i·nτ/ln(τ)} ≡ e^{iτn} — τ is the substrate, e is infrastructure.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="dark" data-collapsed="false">

  <!-- App root: single inversion target for light mode -->
  <div id="app-root">

    <!-- Three.js viewport -->
    <div id="container"></div>

    <!-- HUD: top-left -->
    <div id="hud" class="glass">
      <div class="hud-title">
        <span class="status-dot"></span>
        τ-Euler Atlas
      </div>
      <div class="hud-row">
        <span class="hud-key">FPS</span>
        <span class="hud-val" id="fps-display">—</span>
      </div>
      <div class="hud-row">
        <span class="hud-key">Points</span>
        <span class="hud-val" id="budget-display">—</span>
      </div>
      <div class="hud-row">
        <span class="hud-key">Compute</span>
        <span class="hud-val" id="compute-display">—</span>
      </div>
      <div class="hud-row">
        <span class="hud-key">T</span>
        <span class="hud-val" id="T-display">—</span>
      </div>
      <div class="hud-row">
        <span class="hud-key">k</span>
        <span class="hud-val" id="k-display">—</span>
      </div>
      <div class="hud-row">
        <span class="hud-key">k₁</span>
        <span class="hud-val" id="k1-display">—</span>
      </div>
      <div class="hud-row">
        <span class="hud-key">q</span>
        <span class="hud-val" id="q-display">—</span>
      </div>
      <div class="hud-row">
        <span class="hud-key">d</span>
        <span class="hud-val" id="d-display">—</span>
      </div>
      <div class="hud-row">
        <span class="hud-key">τ^k</span>
        <span class="hud-val" id="tauk-display">—</span>
      </div>
      <div class="hud-row">
        <span class="hud-key">f</span>
        <span class="hud-val" id="f-display">—</span>
      </div>
      <div class="hud-row">
        <span class="hud-key">E_proof</span>
        <span class="hud-val" id="eproof-display">—</span>
      </div>
      <div class="hud-row">
        <span class="hud-key">Closure</span>
        <span class="hud-val" id="closure-display">—</span>
      </div>
      <div class="hud-row">
        <span class="hud-key">Atlas paths</span>
        <span class="hud-val" id="atlas-paths-display">—</span>
      </div>
    </div>

    <!-- Controls panel: right side -->
    <div id="controls-panel">
      <!-- Populated by js/controls.js -->
    </div>

    <!-- Transport bar: visible only when collapsed -->
    <div id="transport-bar">
      <!-- Populated by js/controls.js -->
    </div>

    <!-- Info bar: bottom center -->
    <div id="info-bar" class="glass">
      f = k₁·τ<sup>i·τ<sup>k</sup>/ln(τ)</sup> · sin(n·f)·k₂ &nbsp;|&nbsp; α closes at n=1 ⟺ α=τ
    </div>

  </div><!-- /app-root -->

  <!-- Three.js import map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="js/main.js"></script>

</body>
</html>
