<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leonhard Euler's Day Off — τ-Euler Atlas</title>
  <meta name="description" content="Interactive proof that τ is the unique constant where one unit of counting equals one full rotation. τ^{i·nτ/ln(τ)} ≡ e^{iτn} — τ is the substrate, e is infrastructure.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="dark" data-collapsed="false" data-render="cinematic">

  <!-- App root: single inversion target for light mode -->
  <div id="app-root">

    <!-- Three.js viewport -->
    <div id="container"></div>

    <!-- Left column: HUD + Proofs -->
    <div id="left-column">
      <div id="hud" class="accordion-panel">
        <div id="hud-header" class="accordion-header">
          <span class="hud-title"><span class="status-dot"></span> Tau-Euler Atlas</span>
        </div>
        <div id="hud-body" class="accordion-body">
        <div class="hud-row">
          <span class="hud-key">FPS</span>
          <span class="hud-val" id="fps-display">—</span>
        </div>
        <div class="hud-row">
          <span class="hud-key">Points</span>
          <span class="hud-val" id="budget-display">—</span>
        </div>
        <div class="hud-row">
          <span class="hud-key">Compute</span>
          <span class="hud-val" id="compute-display">—</span>
        </div>
        <div class="hud-row">
          <span class="hud-key">Buffer</span>
          <span class="hud-val" id="buffer-status-display">-</span>
        </div>
        <div class="hud-row">
          <span class="hud-key">Buffer mode</span>
          <span class="hud-val" id="buffer-mode-display-hud">OFF</span>
        </div>
        <div class="hud-row">
          <span class="hud-key">T</span>
          <span class="hud-val" id="T-display">—</span>
        </div>
        <div class="hud-row">
          <span class="hud-key">k</span>
          <span class="hud-val" id="k-display">—</span>
        </div>
        <div class="hud-row">
          <span class="hud-key">k₁</span>
          <span class="hud-val" id="k1-display">—</span>
        </div>
        <div class="hud-row">
          <span class="hud-key">q</span>
          <span class="hud-val" id="q-display">—</span>
        </div>
        <div class="hud-row">
          <span class="hud-key">d</span>
          <span class="hud-val" id="d-display">—</span>
        </div>
        <div class="hud-row">
          <span class="hud-key">l_base</span>
          <span class="hud-val" id="lbase-display">—</span>
        </div>
        <div class="hud-row">
          <span class="hud-key">s = 1/b</span>
          <span class="hud-val" id="s-display">—</span>
        </div>
        <div class="hud-row">
          <span class="hud-key">τ^k</span>
          <span class="hud-val" id="tauk-display">—</span>
        </div>
        <div class="hud-row">
          <span class="hud-key">f</span>
          <span class="hud-val" id="f-display">—</span>
        </div>
        <div class="hud-row">
          <span class="hud-key">Formula</span>
          <span class="hud-val" id="formula-display">Tau</span>
        </div>
        <div class="hud-row">
          <span class="hud-key">Atlas paths</span>
          <span class="hud-val" id="atlas-paths-display">—</span>
        </div>
        <div class="accordion-panel" style="margin-top:4px">
          <div class="accordion-header collapsed" id="expr-accordion-header" style="padding:2px 6px;cursor:pointer">
            <span class="accordion-header-label" style="font-size:10px">▶ Expressions</span>
          </div>
          <div class="accordion-body collapsed" id="expr-accordion-body">
            <pre class="hud-val" id="atlas-expr-display" style="font-size:9px;margin:2px 0 0;white-space:pre-line;line-height:1.4;font-family:var(--mono)">—</pre>
          </div>
        </div>
      </div>
      </div>

      <div id="camera-panel">
        <!-- Populated by js/controls.js -->
      </div>

      <div id="audio-panel">
        <!-- Populated by js/controls.js -->
      </div>

      <div id="proofs-panel">
        <!-- Populated by js/controls.js -->
      </div>
    </div>

    <!-- Controls panel: right side -->
    <div id="controls-panel">
      <!-- Populated by js/controls.js -->
    </div>

    <!-- Transport bar: visible only when collapsed -->
    <div id="transport-bar">
      <!-- Populated by js/controls.js -->
    </div>

    <!-- Timeline Panel: full-width scene authoring drawer -->
    <div id="timeline-panel" class="timeline-panel" data-visible="false"></div>

    <!-- Info bar: bottom center -->
    <div id="info-bar" class="glass">
      f = k₁·τ<sup>i·τ<sup>k</sup>/ln(τ)</sup> · {base,sin,cos,tan}(n·f)·k₂ &nbsp;|&nbsp; α closes at n=1 ⟺ α=τ
    </div>

    <div id="buffer-overlay" class="buffer-overlay" aria-hidden="true">
      <div class="buffer-overlay-card glass">
        <div class="buffer-overlay-title">Buffering...</div>
        <div class="buffer-overlay-detail" id="buffer-overlay-detail">depth 0/0 - 0%</div>
      </div>
    </div>

  </div><!-- /app-root -->

  <!-- Three.js import map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="js/main.js"></script>

</body>
</html>
